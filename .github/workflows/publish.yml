name: publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, e.g. v0.3.4"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: publish-${{ github.event.release.tag_name || inputs.tag }}
      cancel-in-progress: false
    steps:
      - name: Resolve release tag
        id: release
        run: echo "tag=${{ github.event.release.tag_name || inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="$(node -p "require('./package.json').version")"

          if [ "$TAG" != "v$VERSION" ]; then
            echo "Release tag $TAG does not match package.json version $VERSION"
            exit 1
          fi

          if npm view "copilot-arewecooked@$VERSION" version >/dev/null 2>&1; then
            echo "copilot-arewecooked@$VERSION is already published to npm"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Check package contents
        run: npm pack --dry-run

      - name: Publish with provenance
        run: npm publish --provenance --access public
